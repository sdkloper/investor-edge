<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Kloper – Investor Edge</title>

<link rel="stylesheet" href="css/styles.css">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<header>
    <h1>Saul Kloper – Investor Edge</h1>
    <p>Real-Time Investor Deal Finder with Proprietary ARV Calculator</p>
</header>

<section class="filters">
    <input type="text" id="zipFilter" placeholder="ZIP codes (comma separated)">
    
    <select id="countyFilter">
        <option value="">All Counties</option>
    </select>

    <input type="number" id="priceFilter" placeholder="Max List Price">
    <input type="number" id="diffFilter" placeholder="Min $ Diff">
    <input type="number" id="percentFilter" placeholder="Min % Below ARV">

    <label><input type="checkbox" id="hideNoComps"> Hide No Comps</label>
    <label><input type="checkbox" id="hideAuction"> Hide Auction</label>
    <label><input type="checkbox" id="hideWaterfront"> Hide Waterfront</label>

    <button id="applyFilters">Apply</button>
</section>

<section class="table-container">
<table id="dealsTable">
<thead>
<tr>
<th>MLS</th>
<th>County</th>
<th class="sortable" data-sort="List Price">List Price</th>
<th>ARV</th>
<th class="sortable" data-sort="Diff">$ Diff</th>
<th class="sortable" data-sort="% Below ARV">% Below</th>
<th>Comps</th>
<th>Rent</th>
<th>GRM</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<!-- Modal -->
<div id="compModal" class="modal hidden">
<div class="modal-content">
<span id="closeModal">&times;</span>
<div id="modalBody"></div>
</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
