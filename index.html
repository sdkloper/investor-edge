<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Kloper – Investor Edge</title>

<link rel="stylesheet" href="css/styles.css">
<meta http-equiv="Cache-Control" content="no-store" />
<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
<div id="loginScreen" class="login-container">
  <h2>Investor Edge Login</h2>

  <input type="text" id="loginUser" placeholder="User ID">
  <input type="password" id="loginPass" placeholder="Password">

  <button id="loginBtn">Login</button>

  <p id="loginError" class="login-error"></p>
</div>

<div id="appContainer" style="display:none;">
    <div id="dealsLoading" class="loading-overlay">
    Loading Deals...
  </div>
  <!-- EVERYTHING ELSE ON YOUR SITE WRAPPED INSIDE THIS -->

<header>
    <h1>Saul Kloper – Investor Edge</h1>
    <p>Real-Time Investor Deal Finder with Proprietary ARV Calculator</p>
    <div class="header-menu">
    <div class="menu-left">
      <a href="index.html" class="menu-btn active">Deals</a>
      <a href="analysis.html" class="menu-btn">Comps</a>
       <a href="analyzer.html" class="menu-btn">Analyze</a>
       <a href="rental-analyzer.html" class="menu-btn">Rent Analyze</a>
    </div>
    <button id="logoutBtn" class="menu-btn logout-btn">Logout</button>
  </div>
     
</header>

<section class="filters">

  <div class="filter-group">
    <input type="text" id="zipFilter">
    <label>ZIP Codes (comma separated)</label>
  </div>

  <div class="filter-group">
    <select id="countyFilter"></select>
  </div>

  <div class="filter-group">
    <input type="text" id="priceFilter">
    <label>Max List Price</label>
  </div>

  <div class="filter-group">
    <input type="text" id="diffFilter">
    <label>Minimum $ Diff</label>
  </div>

  <div class="filter-group">
    <input type="number" id="percentFilter">
    <label>Minimum % Below ARV</label>
  </div>

  <label>
    <input type="checkbox" id="showCondo">
    Show Condos
  </label>  
  <label><input type="checkbox" id="showAuction"> Show Auctions</label>
  <label><input type="checkbox" id="showNoComps"> Show No Comps</label>
  <label><input type="checkbox" id="hideWaterfront"> Hide Waterfront</label>

  <button id="applyFilters" class="menu-btn active">Apply</button>


</section>

<section class="table-container">
<table id="dealsTable">
<thead>
<tr>
<th>MLS</th>
<th>Type</th>
<th>Address</th>
<th>County</th>
<th class="sortable" data-sort="List Price">
  List Price <span class="sort-arrow"></span>
</th>
<th class="sortable" data-sort="ARV">
  ARV <span class="sort-arrow"></span>
</th>
<th class="sortable" data-sort="Diff">
  $ Diff <span class="sort-arrow"></span>
</th>

<th class="sortable" data-sort="% Below ARV">
  % Below <span class="sort-arrow"></span>
</th>
  <th class="sortable" data-sort="CDOM">
  DOM <span class="sort-arrow"></span>
</th>   
<th>Sales Comps</th>
 
<th class="sortable" data-sort="Rent">Rent</th>
<th>Rental Comps</th>
  <th>Analyze</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<!-- Modal -->
<div id="compModal" class="modal">
  <div class="modal-content">
    <span id="closeModal" class="close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/app.js?v=3100"></script>
    </div>
</body>
</html>
<!-- force deploy -->
