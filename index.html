<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saul Kloper – Investor Edge</title>

<link rel="stylesheet" href="css/styles.css">
<meta http-equiv="Cache-Control" content="no-store" />
<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<header>
    <h1>Saul Kloper – Investor Edge</h1>
    <p>Real-Time Investor Deal Finder with Proprietary ARV Calculator</p>
</header>

<section class="filters">

  <div class="filter-group">
    <input type="text" id="zipFilter">
    <label>ZIP Codes (comma separated)</label>
  </div>

  <div class="filter-group">
    <select id="countyFilter"></select>
  </div>

  <div class="filter-group">
    <input type="text" id="priceFilter">
    <label>Max List Price</label>
  </div>

  <div class="filter-group">
    <input type="text" id="diffFilter">
    <label>Minimum $ Diff</label>
  </div>

  <div class="filter-group">
    <input type="number" id="percentFilter">
    <label>Minimum % Below ARV</label>
  </div>

  <label><input type="checkbox" id="showNoComps"> Show No Comps</label>
  <label><input type="checkbox" id="showAuction"> Show Auctions</label>
  <label><input type="checkbox" id="hideWaterfront"> Hide Waterfront</label>

  <button id="applyFilters">Apply</button>

</section>

<section class="table-container">
<table id="dealsTable">
<thead>
<tr>
<th>MLS</th>
<th>Address</th>
<th>County</th>
<th class="sortable" data-sort="List Price">
  List Price <span class="sort-arrow"></span>
</th>
<th class="sortable" data-sort="ARV">
  ARV <span class="sort-arrow"></span>
</th>
<th class="sortable" data-sort="Diff">
  $ Diff <span class="sort-arrow"></span>
</th>

<th class="sortable" data-sort="% Below ARV">
  % Below <span class="sort-arrow"></span>
</th>
<th>Comps</th>
<th>Rent</th>
<th>GRM</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<!-- Modal -->
<div id="compModal" class="modal hidden">
<div class="modal-content">
<span id="closeModal">&times;</span>
<div id="modalBody"></div>
</div>
</div>

<script src="js/app.js?v=600"></script>
</body>
</html>
<!-- force deploy -->
