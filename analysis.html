<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Edge | Property Analysis</title>

<link rel="stylesheet" href="css/styles.css">

<!-- Google Places API -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAzmRrPFCK8iN0YigmtI7IIGTATqCHqQH0&libraries=places&callback=initAutocomplete"
  async
  defer
></script>

</head>
<body class="analysis-page">

<header class="page-header">
  <h1>Property Analysis</h1>
  <p class="subtitle">
    Analyze any property using Investor Edge Valuation Engine
  </p>
</header>

<div class="container">

  <!-- INPUT CARD -->
  <div class="card input-card">

    <div class="form-grid">

  <div class="form-group full-width">
    <input type="text" id="address" placeholder="Enter property address">
    <div class="field-help">Property Address</div>
  </div>

  <div class="form-group">
    <select id="structure">
      <option value="Detached">Detached</option>
      <option value="TH">Townhouse (TH)</option>
      <option value="Condo">Condo</option>
    </select>
    <div class="field-help">Structure Type</div>
  </div>

  <div class="form-group">
    <input type="number" id="beds" min="0">
    <div class="field-help">Bedrooms</div>
  </div>

  <div class="form-group">
    <input type="number" id="fullBath" min="0">
    <div class="field-help">Full Bathrooms</div>
  </div>

  <div class="form-group">
    <input type="number" id="halfBath" min="0">
    <div class="field-help">Half Bathrooms</div>
  </div>

  <div class="form-group">
    <input type="number" id="sqft" min="0">
    <div class="field-help">Square Feet</div>
  </div>

  <div class="form-group">
    <select id="waterfront">
      <option value="FALSE">No</option>
      <option value="TRUE">Yes</option>
    </select>
    <div class="field-help">Waterfront</div>
  </div>

  <div class="form-group">
    <select id="garage">
      <option value="0">No</option>
      <option value="1">Yes</option>
    </select>
    <div class="field-help">Garage</div>
  </div>

  <div class="form-group hidden" id="garageSpacesGroup">
    <input type="number" id="garageSpaces" min="0">
    <div class="field-help">Garage Spaces</div>
  </div>

  <div class="form-group">
    <input type="number" id="listPrice" min="0">
    <div class="field-help">List Price </div>
  </div>

</div>

    <button id="analyzeBtn" class="primary-btn">
      Analyze Property
    </button>

    <div id="loading" class="loading hidden">
      Analyzing...
    </div>

  </div>

  <!-- RESULTS -->
  <div id="resultsSection" class="hidden">

    <div id="summaryCard" class="card summary-card"></div>

    <div class="card">
      <h3>Comparable Sales</h3>
      <div class="table-wrapper">
        <table id="compTable">
          <thead>
            <tr>
              <th>Address</th>
              <th>Close Price</th>
              <th>SqFt</th>
              <th>Beds</th>
              <th>Full</th>
              <th>Half</th>
              <th>Distance</th>
              <th>Adj Price</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- ERROR -->
  <div id="errorCard" class="card error-card hidden"></div>

</div>

<script src="js/analysis.js?v=900"></script>

</body>
</html>
