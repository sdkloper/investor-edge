<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flip Analyzer</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body class="analysis-page">

<header>
<h1>Flip Deal Analyzer</h1>
  <div class="header-menu">
    <div class="menu-left">
      <a href="index.html" class="menu-btn">Deals</a>
      <a href="analysis.html" class="menu-btn">Comps</a>
       <a href="analyzer.html" class="menu-btn active">Analyze</a>
    </div>
    <button id="logoutBtn" class="menu-btn logout-btn">Logout</button>
  </div>
</header>
 <p><h3 id="addressDisplay"></h3>
<div class="main-container">

  <!-- LEFT SIDE -->
  <div class="inputs-panel">

    <!-- ROW 1 -->
    <div class="input-group">
      <label>County</label>
      <select id="county">
      <option>Baltimore County</option>
      <option>Anne Arundel County</option>
      <option>Carroll County</option>
      <option>Harford County</option>
      <option>Howard County</option>
      <option>Montgomery County</option>
      </select>

    </div>

    <div></div>

    <!-- ROW 2 -->
    <div class="input-group">
      <label>Purchase</label>
      <input id="purchase" type="text">
    </div>

    <div class="input-group">
      <label>ARV</label>
      <input id="arv" type="text">
    </div>

    <!-- ROW 3 -->
    <div class="input-group">
      <label>Rehab</label>
      <input id="rehab" type="text" value="50000">
    </div>

    <div class="input-group">
      <label>Holding Months</label>
      <input id="months" type="number" value="4">
    </div>

    <!-- FINANCING HEADER -->
    <div class="section-title">Financing</div>

    <!-- ROW 4 -->
    <div class="input-group">
      <label>Finance Type</label>
      <select id="financeType">
        <option value="cash">Cash</option>
        <option value="hard">Hard Money</option>
      </select>
    </div>

    <div></div>

    <!-- ROW 5 -->
    <div class="input-group">
      <label>Interest Rate</label>
      <input id="rate" type="text" value="9">
    </div>

    <div class="input-group">
      <label>LTV</label>
      <input id="ltv" type="text" value="90">
    </div>

    <!-- ROW 6 -->
    <div class="input-group">
      <label>Origination</label>
      <input id="origination" type="text" value="1.25">
    </div>

    <div class="input-group">
      <label>Broker Fee</label>
      <input id="brokerFee" type="text" value="1350">
    </div>

    <!-- ROW 7 -->
    <div class="input-group">
      <label>Mortgage (Auto)</label>
      <input id="mortgage" type="text" disabled>
    </div>

    <div></div>

    <!-- HOLDING COSTS -->
    <div class="section-title">Holding Costs</div>

    <!-- ROW 8 -->
    <div class="input-group">
      <label>Taxes (Annual)</label>
      <input id="taxes" type="text">
    </div>

    <div class="input-group">
      <label>Insurance (Annual)</label>
      <input id="insurance" type="text" value="1400">
    </div>

    <!-- ROW 9 -->
    <div class="input-group">
      <label>Utilities (Monthly)</label>
      <input id="utilities" type="text" value="200">
    </div>

    <div class="input-group">
      <label>Lawn (Monthly)</label>
      <input id="lawn" type="text" value="100">
    </div>

    <!-- ROW 10 -->
    <div class="input-group">
      <label>HOA (Monthly)</label>
      <input id="hoa" type="text">
    </div>

    <div class="input-group">
      <label>Condo (Monthly)</label>
      <input id="condo" type="text">
    </div>

    <!-- SALES -->
    <div class="section-title">Sales</div>

    <!-- ROW 11 -->
    <div class="input-group">
      <label>Desired ROI</label>
      <input id="roi" type="text" value="12">
    </div>

    <div class="input-group">
      <label>Commission</label>
      <input id="commission" type="text" value="5">
    </div>

    <!-- ROW 12 -->
    <div class="input-group">
      <label>Override Sale Price</label>
      <input id="saleOverride" type="text">
    </div>
 
   <div class="input-group">
    <button class="primary-btn" onclick="analyzeDeal()">
    Analyze Deal
    </button>
   </div>
  
</div>
  <!-- RIGHT SIDE -->
  <div class="results-panel">

    <h2>Deal Results</h2>

    <div id="profit"></div>
    <div id="requiredSale"></div>
    <div id="spread"></div>
    <div id="roiOut"></div>
    <div id="cashRoi"></div>
    <div id="cashToClose"></div>
    <div id="buyerClose"></div>
    <div id="sellerClose"></div>

  </div>

</div>
</div>

<script src="js/analyzer.js?v=1800"></script>
 

</body>
</html>
